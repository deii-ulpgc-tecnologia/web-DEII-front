<section class="contenedor-pagina">
  
  <div class="cabecera-pagina">
    <h1 class="titulo-seccion" style="margin-bottom: 0;">Noticias</h1>
    
    <div class="acciones-top">
      <button class="btn" [class.btn-azul]="!esDelegado()" [class.btn-naranja]="esDelegado()" (click)="toggleRol()">
        {{ esDelegado() ? '👤 Modo Delegado' : '👁️ Modo Público' }}
      </button>
      
      <button *ngIf="esDelegado()" class="btn btn-naranja btn-crear" (click)="irACrearNoticia()">
        + Crear Noticia
      </button>
    </div>
  </div>

  <div class="carrusel-contenedor" *ngIf="noticiasCarrusel().length > 0">
    <button class="btn-flecha" (click)="lastNoticia()" aria-label="Anterior">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    
    <div class="carrusel-contenido" 
         (click)="irANoticia(starredNoticia.id)"
         (touchstart)="onTouchStart($event)" 
         (touchend)="onTouchEnd($event)">
         
      <img [src]="starredNoticia.imageUrl" [alt]="starredNoticia.title" class="imagen-carrusel">
      <h2 class="titulo-carrusel">{{ starredNoticia.title }}</h2>
      <span class="overlay-link" style="color: var(--ulpgc-azul); font-weight: bold; text-decoration: underline;">
        Ver noticia completa
      </span>
    </div>

    <button class="btn-flecha" (click)="nextNoticia()" aria-label="Siguiente">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>

  <div class="lista-noticias">
    @for (noticia of noticias(); track noticia.id; let i = $index) {
      <article class="tarjeta-noticia" [class.reverso]="i % 2 !== 0" [class.borde-fijado]="noticia.pinned && esDelegado()">
        
        <div class="tarjeta-imagen-wrapper">
          <img [src]="noticia.imageUrl" [alt]="noticia.title" class="tarjeta-imagen">
        </div>
        
        <div class="tarjeta-info" style="position: relative;">
          
          <div *ngIf="esDelegado()" class="herramientas-delegado">
            
            <button class="btn-icon" (click)="toggleFijar(noticia.id)" [title]="noticia.pinned ? 'Quitar del carrusel' : 'Añadir al carrusel'">
              <svg viewBox="0 0 24 24" [attr.fill]="noticia.pinned ? 'currentColor' : 'none'" stroke="currentColor" stroke-width="2"><path d="M16 9V4l1 1V2H7v3l1-1v5L6 12v2h5v7l1 1 1-1v-7h5v-2l-2-3z"/></svg>
            </button>
            
            <button class="btn-icon" (click)="irAEditarNoticia(noticia.id)" title="Editar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            
            <button class="btn-icon btn-borrar" (click)="borrarNoticia(noticia)" title="Borrar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>

          <span class="fecha">{{ noticia.date }}</span>
          <h3 class="titulo-secundario">{{ noticia.title }}</h3>
          <p class="descripcion">{{ noticia.description }}</p>
        </div>
      </article>
    }
  </div>
</section>
